<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Forgot Password – Nova Earns</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
  <link rel="stylesheet" href="/static/output.css" />
  <script src="/static/lucide.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #09090B;
      color: #FFFFFF;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      -webkit-font-smoothing: antialiased;
    }
    .glass-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(139,92,246,0.18);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45);
    }
    .gradient-text {
      background: linear-gradient(135deg,#8B5CF6,#A855F7,#D946EF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .btn-primary {
      background: linear-gradient(135deg,#7C3AED,#8B5CF6,#A855F7);
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(139,92,246,0.30);
    }
    .btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 32px rgba(139,92,246,0.45); }
    .btn-primary:active { transform: scale(0.96); }
    .btn-secondary {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.25s ease;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
    .auth-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(139,92,246,0.20);
      border-radius: 12px;
      padding: 12px 16px;
      width: 100%;
      color: #FFFFFF;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      outline: none;
    }
    .auth-input:focus {
      border-color: #8B5CF6;
      box-shadow: 0 0 0 3px rgba(139,92,246,0.20);
      background: rgba(255,255,255,0.08);
    }
    .auth-input::placeholder { color: #6B7280; }
    .auth-input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #1a1a2e inset !important;
      -webkit-text-fill-color: #FFFFFF !important;
    }
    .auth-label { display: block; font-size: 13px; font-weight: 500; color: #D1D5DB; margin-bottom: 6px; }
    .auth-link { color: #A855F7; font-weight: 500; text-decoration: none; transition: color 0.2s; }
    .auth-link:hover { color: #C4B5FD; text-decoration: underline; }
    .msg-error {
      background: rgba(239,68,68,0.10);
      border: 1px solid rgba(239,68,68,0.20);
      color: #EF4444;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
    }
    .msg-success {
      background: rgba(34,197,94,0.10);
      border: 1px solid rgba(34,197,94,0.20);
      color: #22C55E;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
    }
    .auth-container { max-width: 400px; width: 100%; }
    .tap-target { min-height: 44px; min-width: 44px; }
    .code-input { letter-spacing: 4px; font-size: 20px; text-align: center; }
    .step { display: none; }
    .step.active { display: block; }
    .password-strength { height: 4px; border-radius: 2px; margin-top: 6px; transition: all 0.3s; }
    .strength-weak   { background: #EF4444; width: 33%; }
    .strength-medium { background: #F59E0B; width: 66%; }
    .strength-strong { background: #22C55E; width: 100%; }
    .strength-label { font-size: 11px; margin-top: 4px; }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="glass-card rounded-2xl p-6 md:p-8">

      <!-- Branding -->
      <div class="text-center mb-5">
        <div class="mx-auto mb-3 w-16 h-16 rounded-full overflow-hidden border border-white/10 bg-white/5 flex items-center justify-center">
          <img src="/static/nova.svg" alt="nova earns logo" />
        </div>
        <h1 class="text-3xl font-extrabold gradient-text tracking-tight">Nova Earns</h1>
        <p class="text-[#9CA3AF] text-sm font-medium mt-1">Password Recovery</p>
      </div>

      <!-- STEP 1: Enter Email -->
      <div id="step1" class="step active">
        <h2 class="text-xl font-bold text-white text-center">Forgot Password?</h2>
        <p class="text-sm text-[#9CA3AF] text-center mt-1 mb-5">Enter your email and we'll send you a reset code.</p>

        <form id="emailForm" class="space-y-4">
          <div>
            <label for="email" class="auth-label">Email</label>
            <div class="relative">
              <i data-lucide="mail" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-[#6B7280] pointer-events-none"></i>
              <input type="email" id="email" required autocomplete="email" class="auth-input pl-10" placeholder="you@example.com">
            </div>
          </div>

          <div id="step1Error" class="msg-error" style="display:none;"></div>
          <div id="step1Success" class="msg-success" style="display:none;"></div>

          <button type="submit" id="sendCodeBtn" class="btn-primary w-full text-white font-semibold py-3 rounded-xl tap-target flex items-center justify-center gap-2">
            <i data-lucide="send" class="w-5 h-5"></i>
            Send Reset Code
          </button>
        </form>
      </div>

      <!-- STEP 2: Enter Code + New Password -->
      <div id="step2" class="step">
        <h2 class="text-xl font-bold text-white text-center">Reset Password</h2>
        <p class="text-sm text-[#9CA3AF] text-center mt-1 mb-5">Enter the code sent to your email and choose a new password.</p>

        <form id="resetForm" class="space-y-4">
          <!-- Code -->
          <div>
            <label for="code" class="auth-label">Reset Code</label>
            <div class="relative">
              <i data-lucide="key" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-[#6B7280] pointer-events-none"></i>
              <input type="text" id="code" required minlength="5" maxlength="5"
                     pattern="\d{5}" inputmode="numeric" placeholder="12345"
                     class="auth-input pl-10 code-input" autocomplete="one-time-code">
            </div>
          </div>

          <!-- New Password -->
          <div>
            <label for="newPassword" class="auth-label">New Password</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-[#6B7280] pointer-events-none"></i>
              <input type="password" id="newPassword" required minlength="8" class="auth-input pl-10 pr-12" placeholder="Min. 8 characters">
              <button type="button" onclick="toggleVis('newPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#9CA3AF] hover:text-white tap-target flex items-center justify-center">
                <i data-lucide="eye" class="w-5 h-5"></i>
              </button>
            </div>
            <div id="strengthBar" class="password-strength bg-white/10"></div>
            <p id="strengthLabel" class="strength-label text-[#9CA3AF]"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label for="confirmPassword" class="auth-label">Confirm Password</label>
            <div class="relative">
              <i data-lucide="lock" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-[#6B7280] pointer-events-none"></i>
              <input type="password" id="confirmPassword" required minlength="8" class="auth-input pl-10 pr-12" placeholder="Repeat new password">
              <button type="button" onclick="toggleVis('confirmPassword', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-[#9CA3AF] hover:text-white tap-target flex items-center justify-center">
                <i data-lucide="eye" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <div id="step2Error" class="msg-error" style="display:none;"></div>
          <div id="step2Success" class="msg-success" style="display:none;"></div>

          <button type="submit" class="btn-primary w-full text-white font-semibold py-3 rounded-xl tap-target flex items-center justify-center gap-2">
            <i data-lucide="shield-check" class="w-5 h-5"></i>
            Reset Password
          </button>

          <button type="button" onclick="goBack()" class="btn-secondary w-full text-white font-semibold py-3 rounded-xl tap-target flex items-center justify-center gap-2">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Use a different email
          </button>
        </form>
      </div>

      <p class="text-center text-sm text-[#9CA3AF] mt-5">
        <a href="/login" class="auth-link">Back to Login</a>
      </p>

    </div>
  </div>

  <script>
    let userEmail = '';

    function showStep(n) {
      document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
      document.getElementById('step' + n).classList.add('active');
    }

    function goBack() {
      showStep(1);
    }

    function toggleVis(inputId, btn) {
      const input = document.getElementById(inputId);
      const type = input.type === 'password' ? 'text' : 'password';
      input.type = type;
      const icon = btn.querySelector('i');
      if (icon) {
        icon.setAttribute('data-lucide', type === 'password' ? 'eye' : 'eye-off');
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
    }

    // Password strength meter
    document.getElementById('newPassword').addEventListener('input', function() {
      const val = this.value;
      const bar = document.getElementById('strengthBar');
      const label = document.getElementById('strengthLabel');
      bar.className = 'password-strength';

      if (!val) { bar.style.width = '0'; label.textContent = ''; return; }

      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      if (score <= 1) {
        bar.classList.add('strength-weak');
        label.textContent = 'Weak';
        label.style.color = '#EF4444';
      } else if (score <= 3) {
        bar.classList.add('strength-medium');
        label.textContent = 'Medium';
        label.style.color = '#F59E0B';
      } else {
        bar.classList.add('strength-strong');
        label.textContent = 'Strong';
        label.style.color = '#22C55E';
      }
    });

    // Step 1 — send code
    document.getElementById('emailForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('step1Error');
      const sucEl = document.getElementById('step1Success');
      const btn = document.getElementById('sendCodeBtn');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      userEmail = document.getElementById('email').value.trim();
      if (!userEmail) return;

      btn.disabled = true;
      btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Sending...';
      if (typeof lucide !== 'undefined') lucide.createIcons();

      try {
        const res = await fetch('/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: userEmail }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.detail || 'Too many requests. Please wait a minute.';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i> Send Reset Code';
          if (typeof lucide !== 'undefined') lucide.createIcons();
          return;
        }

        sucEl.textContent = data.message;
        sucEl.style.display = 'block';
        setTimeout(() => showStep(2), 1200);
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.innerHTML = '<i data-lucide="send" class="w-5 h-5"></i> Send Reset Code';
        if (typeof lucide !== 'undefined') lucide.createIcons();
      }
    });

    // Step 2 — reset password
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const errEl = document.getElementById('step2Error');
      const sucEl = document.getElementById('step2Success');
      errEl.style.display = 'none';
      sucEl.style.display = 'none';

      const code = document.getElementById('code').value.trim();
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      if (newPassword !== confirmPassword) {
        errEl.textContent = 'Passwords do not match.';
        errEl.style.display = 'block';
        return;
      }

      if (newPassword.length < 8) {
        errEl.textContent = 'Password must be at least 8 characters.';
        errEl.style.display = 'block';
        return;
      }

      try {
        const res = await fetch('/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: userEmail,
            code,
            new_password: newPassword,
            confirm_password: confirmPassword,
          }),
        });
        const data = await res.json();

        if (!res.ok) {
          errEl.textContent = data.detail || 'Reset failed. Please try again.';
          errEl.style.display = 'block';
          return;
        }

        sucEl.textContent = data.message + ' Redirecting to login...';
        sucEl.style.display = 'block';
        setTimeout(() => window.location.href = '/login', 2500);
      } catch (err) {
        errEl.textContent = 'Network error. Please try again.';
        errEl.style.display = 'block';
      }
    });

    document.addEventListener('DOMContentLoaded', () => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
    setTimeout(() => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }, 300);
  </script>

</body>
</html>
