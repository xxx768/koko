

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
  <title>Survey Admin – Nova Earns</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />

  <link rel="stylesheet" href="/static/output.css" />
  <script src="/static/lucide.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #09090B;
      color: #FFFFFF;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(139, 92, 246, 0.18);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.45);
    }

    .gradient-text {
      background: linear-gradient(135deg, #8B5CF6, #A855F7, #D946EF);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .btn-primary {
      background: linear-gradient(135deg, #7C3AED, #8B5CF6, #A855F7);
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.30);
    }
    .btn-primary:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(139, 92, 246, 0.45);
    }
    .btn-primary:active { transform: scale(0.96); }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: all 0.25s ease;
    }
    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-1px);
    }
    .btn-secondary:active { transform: scale(0.96); }

    .admin-input {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(139, 92, 246, 0.20);
      border-radius: 10px;
      padding: 8px 12px;
      width: 100%;
      color: #FFFFFF;
      font-size: 13px;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      outline: none;
    }
    .admin-input:focus {
      border-color: #8B5CF6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.20);
      background: rgba(255, 255, 255, 0.08);
    }
    .admin-input::placeholder { color: #6B7280; }

    .admin-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #9CA3AF;
      margin-bottom: 2px;
    }

    .msg-error {
      background: rgba(239, 68, 68, 0.10);
      border: 1px solid rgba(239, 68, 68, 0.20);
      color: #EF4444;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
    }
    .msg-success {
      background: rgba(34, 197, 94, 0.10);
      border: 1px solid rgba(34, 197, 94, 0.20);
      color: #22C55E;
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 13px;
    }

    .admin-container { max-width: 1400px; margin: 0 auto; padding: 0 12px; }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 40;
      background: rgba(9, 9, 11, 0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(139, 92, 246, 0.08);
      padding: 8px 0;
    }

    .tap-target { min-height: 36px; min-width: 36px; }

    ::-webkit-scrollbar { width: 0; height: 0; }
    .hidden-section { display: none; }

    .badge-status {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 500;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      white-space: nowrap;
    }

    /* ====== SIDEBAR LAYOUT ====== */
    .app-shell {
      display: flex;
      min-height: calc(100vh - 53px);
    }

    .sidebar {
      width: 64px;
      flex-shrink: 0;
      background: rgba(255, 255, 255, 0.03);
      border-right: 1px solid rgba(139, 92, 246, 0.10);
      padding: 12px 8px;
      position: sticky;
      top: 53px;
      height: calc(100vh - 53px);
      overflow-y: auto;
      transition: width 0.25s ease;
      z-index: 30;
    }
    .sidebar.expanded { width: 220px; }

    .sidebar-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 8px;
      margin-bottom: 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: #9CA3AF;
      cursor: pointer;
      transition: 0.2s;
    }
    .sidebar-toggle:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .sidebar.expanded .sidebar-toggle { justify-content: flex-start; }

    .sidebar-nav-item {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px;
      margin-bottom: 4px;
      border-radius: 10px;
      background: transparent;
      border: none;
      color: #9CA3AF;
      cursor: pointer;
      transition: 0.2s;
      font-size: 13px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-decoration: none;
    }
    .sidebar-nav-item:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .sidebar-nav-item.active {
      background: linear-gradient(135deg, rgba(124,58,237,0.25), rgba(168,85,247,0.18));
      color: #fff;
      box-shadow: inset 0 0 0 1px rgba(139,92,246,0.35);
    }
    .sidebar-nav-item .nav-label {
      opacity: 0;
      width: 0;
      transition: opacity 0.2s ease;
    }
    .sidebar.expanded .sidebar-nav-item .nav-label {
      opacity: 1;
      width: auto;
    }
    .sidebar-nav-item i { flex-shrink: 0; }

    .main-content { flex: 1; min-width: 0; padding: 16px 12px; }

    .panel-view { display: none; }
    .panel-view.active { display: block; animation: panelFadeIn 0.2s ease; }
    @keyframes panelFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mobile sidebar becomes an overlay drawer */
    @media (max-width: 768px) {
      .sidebar {
        position: fixed;
        left: 0;
        top: 53px;
        height: calc(100vh - 53px);
        width: 64px;
        z-index: 50;
      }
      .sidebar.expanded {
        width: 200px;
        box-shadow: 8px 0 24px rgba(0,0,0,0.5);
      }
      .main-content { padding-left: 12px; }
      .sidebar-backdrop {
        display: none;
        position: fixed;
        inset: 0;
        top: 53px;
        background: rgba(0,0,0,0.5);
        z-index: 45;
      }
      .sidebar-backdrop.active { display: block; }
    }

    /* ====== SURVEY-SPECIFIC ====== */
    .question-block {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .question-block-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .question-number-badge {
      font-size: 10px;
      font-weight: 600;
      color: #C4B5FD;
      background: rgba(139, 92, 246, 0.15);
      border: 1px solid rgba(139, 92, 246, 0.25);
      padding: 2px 8px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .remove-question-btn {
      background: transparent;
      border: none;
      color: #6B7280;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      display: flex;
      transition: 0.2s;
    }
    .remove-question-btn:hover { background: rgba(239,68,68,0.12); color: #F87171; }

    .option-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 6px;
    }
    .option-row .admin-input { font-size: 12px; padding: 6px 10px; }
    .remove-option-btn {
      background: transparent;
      border: none;
      color: #6B7280;
      cursor: pointer;
      padding: 4px;
      border-radius: 8px;
      display: flex;
      flex-shrink: 0;
      transition: 0.2s;
    }
    .remove-option-btn:hover { background: rgba(239,68,68,0.12); color: #F87171; }

    .add-option-btn {
      background: transparent;
      border: 1px dashed rgba(139, 92, 246, 0.35);
      color: #C4B5FD;
      font-size: 12px;
      font-weight: 500;
      padding: 6px 10px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .add-option-btn:hover { background: rgba(139, 92, 246, 0.08); border-color: #8B5CF6; }

    .survey-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px;
      transition: 0.2s;
    }
    .survey-card:hover { border-color: rgba(139, 92, 246, 0.25); background: rgba(255,255,255,0.045); }

    .empty-state {
      text-align: center;
      padding: 32px 16px;
      color: #6B7280;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <!-- ====== STICKY HEADER ====== -->
  <header class="sticky-header admin-container flex flex-wrap items-center justify-between gap-2">
    <div class="flex items-center gap-2">
      <span class="text-lg font-extrabold gradient-text">Nova Earns</span>
      <span class="text-[9px] font-medium text-[#9CA3AF] bg-white/5 px-2 py-0.5 rounded-full">Admin</span>
    </div>
    <div class="flex items-center gap-3 text-sm flex-wrap">
      <a href="/dashboard" class="text-[#9CA3AF] hover:text-white transition-colors tap-target flex items-center gap-1.5">
        <i data-lucide="layout-dashboard" class="w-4 h-4"></i> <span class="hidden sm:inline">User Dashboard</span>
      </a>
      <a href="/survey-admin" class="text-white transition-colors tap-target flex items-center gap-1.5">
        <i data-lucide="clipboard-list" class="w-4 h-4"></i> <span class="hidden sm:inline">Manage Surveys</span>
      </a>
      <a href="/admin-analytics" class="text-[#9CA3AF] hover:text-white transition-colors tap-target flex items-center gap-1.5">
        <i data-lucide="bar-chart-3" class="w-4 h-4"></i> <span class="hidden sm:inline">Analytics</span>
      </a>
      <a href="#" id="logoutBtn" class="text-[#9CA3AF] hover:text-[#F87171] transition-colors tap-target flex items-center gap-1.5">
        <i data-lucide="log-out" class="w-4 h-4"></i> <span class="hidden sm:inline">Logout</span>
      </a>
    </div>
  </header>

  <div class="app-shell">
    <!-- ====== SIDEBAR ====== -->
    <div id="sidebarBackdrop" class="sidebar-backdrop" onclick="closeMobileSidebar()"></div>
    <aside id="sidebar" class="sidebar">
      <button type="button" class="sidebar-toggle" onclick="toggleSidebar()" title="Expand menu">
        <i data-lucide="panel-left" class="w-4 h-4"></i>
        <span class="nav-label">Menu</span>
      </button>
      <a href="/admin-dashboard#usersPanel" class="sidebar-nav-item" title="Users">
        <i data-lucide="users" class="w-4 h-4"></i><span class="nav-label">Users</span>
      </a>
      <a href="/admin-dashboard#withdrawalsPanel" class="sidebar-nav-item" title="Withdrawals">
        <i data-lucide="credit-card" class="w-4 h-4"></i><span class="nav-label">Withdrawals</span>
      </a>
      <a href="/admin-dashboard#announcementsPanel" class="sidebar-nav-item" title="Announcements">
        <i data-lucide="megaphone" class="w-4 h-4"></i><span class="nav-label">Announcements</span>
      </a>
      <button type="button" class="sidebar-nav-item active" title="Surveys">
        <i data-lucide="clipboard-list" class="w-4 h-4"></i><span class="nav-label">Surveys</span>
      </button>
      <a href="/admin-dashboard#bonusPanel" class="sidebar-nav-item" title="Daily Bonus">
        <i data-lucide="gift" class="w-4 h-4"></i><span class="nav-label">Daily Bonus</span>
      </a>
      <a href="/admin-dashboard#referralPanel" class="sidebar-nav-item" title="Referral Settings">
        <i data-lucide="share-2" class="w-4 h-4"></i><span class="nav-label">Referral Settings</span>
      </a>
      <a href="/admin-dashboard#withdrawalSettingsPanel" class="sidebar-nav-item" title="Withdrawal Settings">
        <i data-lucide="settings" class="w-4 h-4"></i><span class="nav-label">Withdrawal Settings</span>
      </a>
    </aside>

    <main class="main-content">
      <div class="admin-container space-y-4" style="margin:0; max-width:900px; padding:0;">

        <!-- ===================== CREATE SURVEY ===================== -->
        <section class="glass-card rounded-2xl p-3 md:p-4">
          <h2 class="text-base font-bold text-white flex items-center gap-2 mb-3">
            <i data-lucide="clipboard-list" class="w-4 h-4 text-[#8B5CF6]"></i> Create Survey
          </h2>
          <form id="surveyForm" class="space-y-3">
            <div>
              <label class="admin-label">Survey Title</label>
              <input type="text" id="surveyTitle" placeholder="e.g. Weekly Shopping Habits" required class="admin-input">
            </div>
            <div>
              <label class="admin-label">Description</label>
              <textarea id="surveyDescription" placeholder="Brief description of what this survey covers..." rows="2" class="admin-input resize-none"></textarea>
            </div>
            <div class="w-full sm:w-48">
              <label class="admin-label">Reward Amount (₦)</label>
              <input type="number" id="surveyReward" min="0" step="0.01" placeholder="0.00" required class="admin-input">
            </div>

            <div>
              <div class="flex items-center justify-between mb-2">
                <label class="admin-label" style="margin-bottom:0;">Questions</label>
              </div>
              <div id="questionsContainer"></div>
              <button type="button" onclick="addQuestion()" class="btn-secondary text-white font-medium px-3 py-1.5 rounded-lg text-xs tap-target flex items-center gap-1.5">
                <i data-lucide="plus" class="w-3.5 h-3.5"></i> Add Question
              </button>
            </div>

            <div id="message" class="hidden-section"></div>

            <div class="flex items-center gap-3 pt-1">
              <button type="submit" class="btn-primary text-white font-semibold px-5 py-2 rounded-lg text-sm tap-target flex items-center gap-1.5">
                <i data-lucide="check" class="w-4 h-4"></i> Create Survey
              </button>
            </div>
          </form>
        </section>

        <!-- ===================== EXISTING SURVEYS ===================== -->
        <section class="glass-card rounded-2xl p-3 md:p-4">
          <h2 class="text-base font-bold text-white flex items-center gap-2 mb-3">
            <i data-lucide="list-checks" class="w-4 h-4 text-[#8B5CF6]"></i> Existing Surveys
          </h2>
          <div id="surveysList" class="space-y-2"></div>
        </section>

      </div>
    </main>
  </div>

  <!-- ====== JAVASCRIPT (100% PRESERVED LOGIC - only UI/DOM target strings updated) ====== -->
  <script>
    const token = sessionStorage.getItem('access_token');
    if (!token) window.location.href = '/login';

    function authHeaders() {
      return { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' };
    }

    // ---- SIDEBAR ----
    function toggleSidebar() {
      const sb = document.getElementById('sidebar');
      sb.classList.toggle('expanded');
      const backdrop = document.getElementById('sidebarBackdrop');
      if (window.innerWidth <= 768) {
        backdrop.classList.toggle('active', sb.classList.contains('expanded'));
      }
    }
    function closeMobileSidebar() {
      document.getElementById('sidebar').classList.remove('expanded');
      document.getElementById('sidebarBackdrop').classList.remove('active');
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    let questionCounter = 0;

    function addQuestion() {
      const container = document.getElementById('questionsContainer');
      questionCounter++;
      const qNum = container.children.length + 1;
      const block = document.createElement('div');
      block.className = 'question-block';
      block.innerHTML = `
        <div class="question-block-header">
          <span class="question-number-badge">Question ${qNum}</span>
          <button type="button" class="remove-question-btn" onclick="removeQuestion(this)" title="Remove question">
            <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
          </button>
        </div>
        <input type="text" class="questionPrompt admin-input mb-2" placeholder="Question prompt" required>
        <div class="optionsContainer"></div>
        <button type="button" class="add-option-btn" onclick="addOption(this.parentElement.querySelector('.optionsContainer'))">
          <i data-lucide="plus" class="w-3 h-3"></i> Add Option
        </button>
      `;
      container.appendChild(block);
      addOption(block.querySelector('.optionsContainer'));
      addOption(block.querySelector('.optionsContainer'));
      renumberQuestions();
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function removeQuestion(btn) {
      btn.closest('.question-block').remove();
      renumberQuestions();
    }

    function renumberQuestions() {
      const blocks = document.querySelectorAll('#questionsContainer > .question-block');
      blocks.forEach((block, i) => {
        block.querySelector('.question-number-badge').textContent = `Question ${i + 1}`;
      });
    }

    function addOption(container) {
      const index = container.children.length + 1;
      const row = document.createElement('div');
      row.className = 'option-row';
      row.innerHTML = `
        <input type="text" class="optionValue admin-input" placeholder="Option ${index}" required>
        <button type="button" class="remove-option-btn" onclick="this.parentElement.remove()" title="Remove option">
          <i data-lucide="x" class="w-3.5 h-3.5"></i>
        </button>
      `;
      container.appendChild(row);
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function formatNaira(amount) {
      return `₦${Number(amount || 0).toLocaleString('en-NG', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
    }

    async function loadSurveys() {
      const res = await fetch('/admin/surveys', { headers: authHeaders() });
      const data = await res.json();
      const list = document.getElementById('surveysList');
      if (!data.length) {
        list.innerHTML = '<div class="empty-state"><i data-lucide="inbox" class="w-6 h-6 mx-auto mb-2 opacity-50"></i><br>No surveys yet.</div>';
        if (typeof lucide !== 'undefined') lucide.createIcons();
        return;
      }
      list.innerHTML = data.map(s => `
        <div class="survey-card flex flex-wrap items-start justify-between gap-2">
          <div class="flex-1 min-w-0">
            <strong class="text-sm text-white">${escHtml(s.title)}</strong>
            ${s.description ? `<p class="text-xs text-[#D1D5DB] mt-0.5">${escHtml(s.description)}</p>` : ''}
            <div class="mt-1.5"><span class="badge-status text-[#22C55E]">Reward: ${formatNaira(s.reward_amount)}</span></div>
          </div>
          <button type="button" onclick="deleteSurvey(${s.id})" class="p-1.5 rounded-lg hover:bg-white/10 transition tap-target" title="Delete">
            <i data-lucide="trash-2" class="w-4 h-4 text-[#EF4444]"></i>
          </button>
        </div>
      `).join('');
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    async function deleteSurvey(id) {
      if (!confirm('Delete this survey?')) return;
      const res = await fetch(`/admin/surveys/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (res.ok) loadSurveys();
    }

    document.getElementById('surveyForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const messageEl = document.getElementById('message');
      messageEl.className = 'hidden-section';

      const questions = [];
      const questionBlocks = document.querySelectorAll('#questionsContainer > .question-block');
      for (const block of questionBlocks) {
        const prompt = block.querySelector('.questionPrompt').value.trim();
        const options = Array.from(block.querySelectorAll('.optionValue')).map(o => ({ label: o.value.trim() })).filter(o => o.label);
        if (!prompt || options.length < 2) continue;
        questions.push({ prompt, options });
      }
      const payload = {
        title: document.getElementById('surveyTitle').value.trim(),
        description: document.getElementById('surveyDescription').value.trim(),
        reward_amount: Number(document.getElementById('surveyReward').value),
        questions,
      };
      const res = await fetch('/admin/surveys', { method: 'POST', headers: authHeaders(), body: JSON.stringify(payload) });
      const data = await res.json();
      if (!res.ok) {
        messageEl.textContent = data.detail || 'Failed to create survey.';
        messageEl.className = 'msg-error';
        return;
      }
      messageEl.textContent = 'Survey created successfully.';
      messageEl.className = 'msg-success';
      document.getElementById('surveyForm').reset();
      document.getElementById('questionsContainer').innerHTML = '';
      addQuestion();
      loadSurveys();
    });

    document.getElementById('logoutBtn').addEventListener('click', async function(e) {
      e.preventDefault();
      const refresh = sessionStorage.getItem('refresh_token');
      await fetch('/auth/logout', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ refresh_token: refresh }) });
      sessionStorage.clear();
      window.location.href = '/login';
    });

    // ---- INIT ----
    loadSurveys();
    addQuestion();

    document.addEventListener('DOMContentLoaded', function() {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    });
    setTimeout(() => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }, 300);
  </script>
</body>
</html>
